<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANAKA ANALYTICS PRO V6</title>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --card-bg: #151b23;
            --border: #30363d;
            --accent-green: #00ffa3;
            --accent-red: #ff4646;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --neon-glow: 0 0 15px rgba(0, 255, 163, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            overflow-y: auto; /* Scroll කිරීමට ඉඩ ලබා දීම */
        }

        /* Header Design */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 10px;
            box-shadow: var(--neon-glow);
        }

        .brand {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-green), #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #liveTime {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-green);
            text-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
        }

        /* Controls Area */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            color: var(--accent-green);
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* Chart Area - උස අඩු කර ඇත */
        #chart {
            height: 300px; /* Chart එකේ උස මෙතනින් වෙනස් කළ හැක */
            width: 100%;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            margin-top: 10px;
            background: rgba(0, 255, 163, 0.05);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 163, 0.2);
        }

        .status-text { font-size: 13px; font-weight: 600; color: var(--accent-green); }

    </style>
</head>
<body>

<div class="top-nav">
    <div class="brand">JANAKA ANALYTICS PRO V6</div>
    <div id="liveTime">00:00:00</div>
</div>

<div class="controls">
    <div class="input-group">
        <label>Market Asset</label>
        <select id="marketSelect">
            <optgroup label="Volatility Indices">
                <option value="R_100">Volatility 100 Index</option>
                <option value="R_75">Volatility 75 Index</option>
                <option value="R_50">Volatility 50 Index</option>
                <option value="R_25">Volatility 25 Index</option>
            </optgroup>
        </select>
    </div>
    <div class="input-group">
        <label>Timeframe</label>
        <select id="tfSelect">
            <option value="60">1 Minute</option>
            <option value="300">5 Minutes</option>
        </select>
    </div>
</div>

<div id="chart"></div>

<div class="status-bar">
    <span class="status-text">SYSTEM STATUS: <span id="connStatus">CONNECTING...</span></span>
</div>

<script>
    const APP_ID = "1089";
    let chart, candleSeries, ws;
    let candles = [];
    let currentAsset = "R_100";
    let currentTF = "60";

    // --- 1. Clock එක Update කරන Function එක ---
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('liveTime').innerText = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- 2. Chart එක Initialize කිරීම ---
    function initChart() {
        const chartElement = document.getElementById('chart');
        chart = LightweightCharts.createChart(chartElement, {
            layout: { background: { color: '#151b23' }, textColor: '#8b949e' },
            grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
            timeScale: { timeVisible: true, secondsVisible: false },
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ffa3', downColor: '#ff4646',
            wickUpColor: '#00ffa3', wickDownColor: '#ff4646',
        });

        // Resize Chart
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartElement.clientWidth, height: 400 });
        });
    }

    function connect() {
        if (ws) ws.close();
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);
        
        ws.onopen = () => {
            document.getElementById('connStatus').innerText = "LIVE DATA CONNECTED";
            ws.send(JSON.stringify({
                ticks_history: currentAsset,
                end: "latest",
                style: "candles",
                granularity: parseInt(currentTF),
                count: 500,
                subscribe: 1
            }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.candles) {
                candles = data.candles.map(c => ({
                    time: c.epoch,
                    open: c.open, high: c.high, low: c.low, close: c.close
                }));
                candleSeries.setData(candles);
            }
            if (data.ohlc) {
                const o = data.ohlc;
                const newCandle = {
                    time: o.open_time,
                    open: parseFloat(o.open), high: parseFloat(o.high),
                    low: parseFloat(o.low), close: parseFloat(o.close)
                };
                candleSeries.update(newCandle);
            }
        };
    }

    // Dropdown වෙනස් කරන විට Update කිරීම
    document.getElementById('marketSelect').addEventListener('change', (e) => {
        currentAsset = e.target.value;
        connect();
    });

    document.getElementById('tfSelect').addEventListener('change', (e) => {
        currentTF = e.target.value;
        connect();
    });

    initChart();
    connect();

</script>
</body>
</html>
