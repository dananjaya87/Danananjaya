<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANAKA ANALYTICS PRO V6</title>
    <!-- Lightweight Charts Library -->
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --card-bg: #151b23;
            --border: #30363d;
            --accent-green: #00ffa3;
            --accent-red: #ff4646;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --neon-glow: 0 0 15px rgba(0, 255, 163, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Header Design */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: var(--neon-glow);
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-green), #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Controls Area */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            color: var(--accent-green);
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* Main Chart Area */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 15px;
        }

        #chart {
            height: 500px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        /* Stats Sidebar */
        .stats-sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .stat-card span { font-size: 10px; color: var(--text-secondary); margin-bottom: 5px; }
        .stat-card b { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .val-up { color: var(--accent-green) !important; }
        .val-down { color: var(--accent-red) !important; }

        /* Market Status Bar */
        .status-bar {
            margin-top: 15px;
            background: rgba(0, 255, 163, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 163, 0.2);
        }

        .status-text { font-size: 14px; font-weight: 600; color: var(--accent-green); letter-spacing: 1px; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="brand">JANAKA ANALYTICS PRO V6</div>
    <div id="liveTime" style="font-size: 14px; color: var(--text-secondary);">00:00:00</div>
</div>

<div class="controls">
    <div class="input-group">
        <label>Market Asset</label>
        <select id="marketSelect">
            <optgroup label="Volatility Indices">
                <option value="R_100">Volatility 100 Index</option>
                <option value="R_75">Volatility 75 Index</option>
                <option value="R_50">Volatility 50 Index</option>
                <option value="R_25">Volatility 25 Index</option>
                <option value="1HZ100V">Volatility 100 (1s)</option>
            </optgroup>
            <optgroup label="Forex">
                <option value="frxEURUSD">EUR/USD</option>
                <option value="frxGBPUSD">GBP/USD</option>
                <option value="frxUSDJPY">USD/JPY</option>
            </optgroup>
        </select>
    </div>
    <div class="input-group">
        <label>Timeframe</label>
        <select id="tfSelect">
            <option value="60">1 Minute (Scalping)</option>
            <option value="300">5 Minutes (Intraday)</option>
            <option value="900">15 Minutes (Swing)</option>
        </select>
    </div>
</div>

<div class="main-container">
    <div id="chart"></div>
    
    <div class="stats-sidebar">
        <div class="stat-card">
            <span>LIVE PRICE</span>
            <b id="livePrice">0.0000</b>
        </div>
        <div class="stat-card">
            <span>24H HIGH</span>
            <b id="maxPrice">0.0000</b>
        </div>
        <div class="stat-card">
            <span>24H LOW</span>
            <b id="minPrice">0.0000</b>
        </div>
        <div class="stat-card">
            <span>MARKET TREND</span>
            <b id="trendLabel">ANALYZING...</b>
        </div>
    </div>
</div>

<div class="status-bar">
    <span class="status-text">SYSTEM STATUS: <span id="connStatus">CONNECTING TO DERIV API...</span></span>
</div>

<script>
    const APP_ID = "1089";
    let chart, candleSeries, ws;
    let candles = [];
    let currentAsset = "R_100";
    let currentTF = "60";

    // Chart Initialization
    function initChart() {
        const chartElement = document.getElementById('chart');
        chart = LightweightCharts.createChart(chartElement, {
            layout: {
                background: { color: '#151b23' },
                textColor: '#8b949e',
                fontSize: 12,
                fontFamily: 'Inter',
            },
            grid: {
                vertLines: { color: '#21262d' },
                horzLines: { color: '#21262d' },
            },
            rightPriceScale: {
                borderColor: '#30363d',
            },
            timeScale: {
                borderColor: '#30363d',
                timeVisible: true,
                secondsVisible: false,
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ffa3',
            downColor: '#ff4646',
            borderVisible: false,
            wickUpColor: '#00ffa3',
            wickDownColor: '#ff4646',
        });

        // Auto-resize chart
        new ResizeObserver(entries => {
            if (entries.length === 0 || !entries[0].contentRect) return;
            const { width, height } = entries[0].contentRect;
            chart.applyOptions({ width, height });
        }).observe(chartElement);
    }

    function connect() {
        if (ws) ws.close();
        
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);
        
        ws.onopen = () => {
            document.getElementById('connStatus').innerText = "LIVE DATA CONNECTED";
            document.getElementById('connStatus').style.color = "var(--accent-green)";
            
            // Initial Data Request
            ws.send(JSON.stringify({
                ticks_history: currentAsset,
                end: "latest",
                style: "candles",
                granularity: parseInt(currentTF),
                count: 500,
                subscribe: 1
            }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.candles) {
                candles = data.candles.map(c => ({
                    time: c.epoch,
                    open: c.open,
                    high: c.high,
                    low: c.low,
                    close: c.close
                }));
                candleSeries.setData(candles);
                updateStats();
            }

            if (data.ohlc) {
                const o = data.ohlc;
                const newCandle = {
                    time: o.open_time,
                    open: parseFloat(o.open),
                    high: parseFloat(o.high),
                    low: parseFloat(o.low),
                    close: parseFloat(o.close)
                };

                // Memory Leak Fix: Limit candles array to 1000
                if (candles.length > 0 && candles[candles.length - 1].time === newCandle.time) {
                    candles[candles.length - 1] = newCandle;
                } else {
                    candles.push(newCandle);
                    if (candles.length > 1000) candles.shift(); 
                }

                candleSeries.update(newCandle);
                updateLivePrice(newCandle.close);
            }
        };

        ws.onclose = () => {
            document.getElementById('connStatus').innerText = "RECONNECTING...";
            document.getElementById('connStatus').style.color = "var(--accent-red)";
            setTimeout(connect, 3000);
        };
    }

    function updateLivePrice(price) {
        const priceEl = document.getElementById('livePrice');
        const lastPrice = parseFloat(priceEl.innerText);
        const dec = currentAsset.includes('frx') ? 5 : 2;
        
        priceEl.innerText = price.toFixed(dec);
        priceEl.className = price >= lastPrice ? 'val-up' : 'val-down';
        
        updateStats();
    }

    function updateStats() {
        if (candles.length < 2) return;
        
        const dec = currentAsset.includes('frx') ? 5 : 2;
        const prices = candles.slice(-50).map(c => c.close);
        const max = Math.max(...candles.map(c => c.high));
        const min = Math.min(...candles.map(c => c.low));
        const current = candles[candles.length - 1].close;
        const previous = candles[candles.length - 2].close;

        document.getElementById('maxPrice').innerText = max.toFixed(dec);
        document.getElementById('minPrice').innerText = min.toFixed(dec);
        
        const trendLabel = document.getElementById('trendLabel');
        if (current > previous) {
            trendLabel.innerText = "BULLISH ↑";
            trendLabel.className = "val-up";
        } else {
            trendLabel.innerText = "BEARISH ↓";
            trendLabel.className = "val-down";
        }
    }

    // Time update
    setInterval(() => {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString();
    }, 1000);

    // Select Event Listeners
    document.getElementById('marketSelect').addEventListener('change', (e) => {
        currentAsset = e.target.value;
        candles = [];
        candleSeries.setData([]);
        connect();
    });

    document.getElementById('tfSelect').addEventListener('change', (e) => {
        currentTF = e.target.value;
        candles = [];
        candleSeries.setData([]);
        connect();
    });

    window.onload = () => {
        initChart();
        connect();
    };
</script>

</body>
</html>
